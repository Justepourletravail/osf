<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>แบบสำรวจ AI สำนักทะเบียน</title>
    <style>
        html, body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #f0f2f5; }
        #chat-container { 
            width: 100%; 
            max-width: 420px;
            height: 100%; 
            margin: 0 auto;
            background: #ffffff; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        
        #chat-header { background: #1a365d; color: white; padding: 16px; text-align: center; font-size: 1.1em; font-weight: bold; }
        
        #chat-header { background: #1a365d; color: white; padding: 16px; text-align: center; font-size: 1.1em; font-weight: bold; }
        
        #chat-box { flex: 1; padding: 20px 16px; overflow-y: auto; display: flex; flex-direction: column; background-color: #ffffff; }
        
        .message-row { display: flex; align-items: flex-start; margin-bottom: 2px; }
        .bot-row { justify-content: flex-start; }
        .user-row { justify-content: flex-end; margin-top: 16px; margin-bottom: 16px; }
        .profile-pic { width: 32px; height: 32px; border-radius: 50%; margin: 0 8px; background-color: #edf2f7; object-fit: cover; display: inline-block; flex-shrink: 0; border: 1px solid #cbd5e0; }
        .hide-pic { visibility: hidden; }
        .message { max-width: 65.5%; padding: 10px 16px; font-size: 14.5px; line-height: 1.4; word-wrap: break-word; word-break: break-word; display: inline-block; }
        .user-message { background: #1a365d; color: #ffffff; border-radius: 18px; }
        .bot-message { background: #edf2f7; color: #2d3748; }
        
        .bot-msg-single { border-radius: 18px; }
        .bot-msg-first { border-radius: 18px 18px 18px 4px; }
        .bot-msg-mid { border-radius: 4px 18px 18px 4px; }
        .bot-msg-last { border-radius: 4px 18px 18px 18px; }

        .typing-indicator { padding: 14px 16px; display: flex; align-items: center; gap: 4px; }
        .typing-indicator span { display: inline-block; width: 6px; height: 6px; background-color: #718096; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        #input-area { display: flex; padding: 12px; background: #f8fafc; border-top: 1px solid #e2e8f0; }
        #user-input { flex: 1; padding: 12px 16px; border: 1px solid #cbd5e0; background-color: #ffffff; border-radius: 20px; outline: none; font-size: 14px; transition: border-color 0.2s; }
        #user-input:focus { border-color: #1a365d; }
        #send-btn { background: #1a365d; color: white; border: none; padding: 10px 18px; margin-left: 8px; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 14px; transition: background 0.2s; }
        #send-btn:hover { background: #2a4365; }
    </style>
</head>
<body>

    <div id="chat-container">
        <div id="chat-header">แบบสำรวจความคิดเห็น</div>
        <div id="chat-box"></div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="พิมพ์ข้อความ..." onkeypress="handleKeyPress(event)">
            <button id="send-btn" onclick="handleUserSubmit()">ส่ง</button>
        </div>
    </div>

<script>
const botSvg = `<?xml version="1.0" encoding="utf-8"?>
<svg width="800px" height="800px" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" aria-hidden="true" role="img" class="iconify iconify--noto" preserveAspectRatio="xMidYMid meet">
<path d="M12.53 53.05c-4.57.01-8.28 3.72-8.28 8.29v38.38a8.297 8.297 0 0 0 8.28 8.28h5.55V53l-5.55.05z" fill="#c62828"></path>
<path d="M115.72 53.05c4.57.01 8.28 3.72 8.28 8.29v38.38c-.01 4.57-3.71 8.28-8.28 8.29h-5.55v-55l5.55.04z" fill="#c62828"></path>

<path d="M64 18c-2.21 0-4-1.79-4-4s1.79-4 4-4s4 1.79 4 4s-1.79 4-4 4z" fill="#c62828"></path>
<g>
<linearGradient id="IconifyId17ecdb2904d178eab19904" gradientUnits="userSpaceOnUse" x1="64.005" y1="22.44" x2="64.005" y2="35.55" gradientTransform="matrix(1 0 0 -1 0 130)"><stop offset=".12" stop-color="#e0e0e0"></stop><stop offset=".52" stop-color="#ffffff"></stop><stop offset="1" stop-color="#eaeaea"></stop></linearGradient>
<path d="M44.15 94.45h39.71c3.46 0 6.27 2.81 6.27 6.27v.57c0 3.46-2.81 6.27-6.27 6.27H44.15c-3.46 0-6.27-2.81-6.27-6.27v-.57c0-3.46 2.81-6.27 6.27-6.27z" fill="url(#IconifyId17ecdb2904d178eab19904)"></path>
<linearGradient id="IconifyId17ecdb2904d178eab19905" gradientUnits="userSpaceOnUse" x1="54.85" y1="22.44" x2="54.85" y2="35.53" gradientTransform="matrix(1 0 0 -1 0 130)"><stop offset="0" stop-color="#333"></stop><stop offset=".55" stop-color="#666"></stop><stop offset="1" stop-color="#333"></stop></linearGradient>
<path fill="url(#IconifyId17ecdb2904d178eab19905)" d="M53.67 94.47h2.36v13.09h-2.36z"></path>
<linearGradient id="IconifyId17ecdb2904d178eab19906" gradientUnits="userSpaceOnUse" x1="64.06" y1="22.44" x2="64.06" y2="35.53" gradientTransform="matrix(1 0 0 -1 0 130)"><stop offset="0" stop-color="#333"></stop><stop offset=".55" stop-color="#666"></stop><stop offset="1" stop-color="#333"></stop></linearGradient>
<path fill="url(#IconifyId17ecdb2904d178eab19906)" d="M62.88 94.47h2.36v13.09h-2.36z"></path>
<linearGradient id="IconifyId17ecdb2904d178eab19907" gradientUnits="userSpaceOnUse" x1="73.15" y1="22.44" x2="73.15" y2="35.53" gradientTransform="matrix(1 0 0 -1 0 130)"><stop offset="0" stop-color="#333"></stop><stop offset=".55" stop-color="#666"></stop><stop offset="1" stop-color="#333"></stop></linearGradient>
<path fill="url(#IconifyId17ecdb2904d178eab19907)" d="M71.97 94.47h2.36v13.09h-2.36z"></path>
<linearGradient id="IconifyId17ecdb2904d178eab19908" gradientUnits="userSpaceOnUse" x1="82.8" y1="22.44" x2="82.8" y2="35.53" gradientTransform="matrix(1 0 0 -1 0 130)"><stop offset="0" stop-color="#333"></stop><stop offset=".55" stop-color="#666"></stop><stop offset="1" stop-color="#333"></stop></linearGradient>
<path fill="url(#IconifyId17ecdb2904d178eab19908)" d="M81.62 94.47h2.36v13.09h-2.36z"></path>
<linearGradient id="IconifyId17ecdb2904d178eab19909" gradientUnits="userSpaceOnUse" x1="45.2" y1="22.46" x2="45.2" y2="35.55" gradientTransform="matrix(1 0 0 -1 0 130)"><stop offset="0" stop-color="#333"></stop><stop offset=".55" stop-color="#666"></stop><stop offset="1" stop-color="#333"></stop></linearGradient>
<path fill="url(#IconifyId17ecdb2904d178eab19909)" d="M44.02 94.45h2.36v13.09h-2.36z"></path>
<g><path d="M64 85.33h-5.33c-.55 0-1-.45-1-1c0-.16.04-.31.11-.45l2.74-5.41l2.59-4.78a.996.996 0 0 1 1.76 0l2.61 5l2.71 5.19c.25.49.06 1.09-.43 1.35c-.14.07-.29.11-.45.11L64 85.33z" fill="#c62828"></path></g>
<g><radialGradient id="IconifyId17ecdb2904d178eab19910" cx="42.64" cy="63.19" r="11.5" gradientTransform="matrix(1 0 0 -1 0 130)" gradientUnits="userSpaceOnUse"><stop offset=".48" stop-color="#ffffff"></stop><stop offset=".77" stop-color="#fdfdfd"></stop><stop offset=".88" stop-color="#f6f6f6"></stop><stop offset=".96" stop-color="#ebebeb"></stop><stop offset="1" stop-color="#e0e0e0"></stop></radialGradient><circle cx="42.64" cy="66.81" r="11.5" fill="url(#IconifyId17ecdb2904d178eab19910)"></circle><linearGradient id="IconifyId17ecdb2904d178eab19911" gradientUnits="userSpaceOnUse" x1="30.14" y1="63.19" x2="55.14" y2="63.19" gradientTransform="matrix(1 0 0 -1 0 130)"><stop offset="0" stop-color="#333"></stop><stop offset=".55" stop-color="#666"></stop><stop offset="1" stop-color="#333"></stop></linearGradient><circle cx="42.64" cy="66.81" r="11.5" fill="none" stroke="url(#IconifyId17ecdb2904d178eab19911)" stroke-width="2" stroke-miterlimit="10"></circle><radialGradient id="IconifyId17ecdb2904d178eab19912" cx="84.95" cy="63.22" r="11.5" gradientTransform="matrix(1 0 0 -1 0 130)" gradientUnits="userSpaceOnUse"><stop offset=".48" stop-color="#ffffff"></stop><stop offset=".77" stop-color="#fdfdfd"></stop><stop offset=".88" stop-color="#f6f6f6"></stop><stop offset=".96" stop-color="#ebebeb"></stop><stop offset="1" stop-color="#e0e0e0"></stop></radialGradient><path d="M85 55.28c-6.35 0-11.5 5.15-11.5 11.5s5.15 11.5 11.5 11.5s11.5-5.15 11.5-11.5c-.01-6.35-5.15-11.49-11.5-11.5z" fill="url(#IconifyId17ecdb2904d178eab19912)"></path><linearGradient id="IconifyId17ecdb2904d178eab19913" gradientUnits="userSpaceOnUse" x1="72.45" y1="63.22" x2="97.45" y2="63.22" gradientTransform="matrix(1 0 0 -1 0 130)"><stop offset="0" stop-color="#333"></stop><stop offset=".55" stop-color="#666"></stop><stop offset="1" stop-color="#333"></stop></linearGradient><path d="M85 55.28c-6.35 0-11.5 5.15-11.5 11.5s5.15 11.5 11.5 11.5s11.5-5.15 11.5-11.5h0c-.01-6.35-5.15-11.49-11.5-11.5z" fill="none" stroke="url(#IconifyId17ecdb2904d178eab19913)" stroke-width="2" stroke-miterlimit="10"></path></g>
</g>
</svg>`;

const userSvg = `<?xml version="1.0" encoding="utf-8"?>
<svg width="800px" height="800px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
<path opacity="0.5" d="M22 12C22 17.5228 17.5228 22 12 22C6.47715 22 2 17.5228 2 12C2 6.47715 6.47715 2 12 2C17.5228 2 22 6.47715 22 12Z" fill="#1C274C"/>
<path d="M16.807 19.0112C15.4398 19.9504 13.7841 20.5 12 20.5C10.2159 20.5 8.56023 19.9503 7.193 19.0111C6.58915 18.5963 6.33109 17.8062 6.68219 17.1632C7.41001 15.8302 8.90973 15 12 15C15.0903 15 16.59 15.8303 17.3178 17.1632C17.6689 17.8062 17.4108 18.5964 16.807 19.0112Z" fill="#1C274C"/>
<path d="M12 12C13.6569 12 15 10.6569 15 9C15 7.34315 13.6569 6 12 6C10.3432 6 9.00004 7.34315 9.00004 9C9.00004 10.6569 10.3432 12 12 12Z" fill="#1C274C"/>
</svg>`;

const BOT_IMG = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(botSvg);
const USER_IMG = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(userSvg);

const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

async function handleUserSubmit() {
    const inputField = document.getElementById("user-input");
    const messageText = inputField.value.trim();
    if (messageText === "") return;

    appendUserMessage(messageText);
    inputField.value = ""; 
    inputField.disabled = true;

    await botBrainLogic(messageText); 
    
    inputField.disabled = false;
    inputField.focus();
}

function handleKeyPress(event) {
    if (event.key === "Enter") handleUserSubmit();
}

async function sendBotMessages(messagesArray) {
    const isGroup = messagesArray.length > 1;
    for (let i = 0; i < messagesArray.length; i++) {
        const showProfilePic = (i === 0); 
        const typingId = "typing-" + Date.now();
        let position = "single";
        if (isGroup) {
            if (i === 0) position = "first";
            else if (i === messagesArray.length - 1) position = "last";
            else position = "mid";
        }

        appendTypingIndicator(typingId, showProfilePic, position);
        const delay = Math.max(600, messagesArray[i].length * 15); 
        await sleep(delay); 
        removeElement(typingId);
        appendBotMessage(messagesArray[i], showProfilePic, position);
    }
}

function appendTypingIndicator(id, showPic, position) {
    const chatBox = document.getElementById("chat-box");
    const row = document.createElement("div");
    row.id = id;
    row.className = "message-row bot-row";
    const picClass = showPic ? "profile-pic" : "profile-pic hide-pic";
    let radiusClass = position === "first" ? "bot-msg-first" : position === "mid" ? "bot-msg-mid" : position === "last" ? "bot-msg-last" : "bot-msg-single";
    row.innerHTML = `<img src="${BOT_IMG}" alt="Bot" class="${picClass}"><div class="message bot-message ${radiusClass} typing-indicator"><span></span><span></span><span></span></div>`;
    chatBox.appendChild(row);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function removeElement(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
}

function appendBotMessage(text, showPic, position) {
    const chatBox = document.getElementById("chat-box");
    const row = document.createElement("div");
    row.className = "message-row bot-row";
    const picClass = showPic ? "profile-pic" : "profile-pic hide-pic";
    let radiusClass = position === "first" ? "bot-msg-first" : position === "mid" ? "bot-msg-mid" : position === "last" ? "bot-msg-last" : "bot-msg-single";
    row.innerHTML = `<img src="${BOT_IMG}" alt="Bot" class="${picClass}"><div class="message bot-message ${radiusClass}">${text}</div>`;
    chatBox.appendChild(row);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function appendUserMessage(text) {
    const chatBox = document.getElementById("chat-box");
    const row = document.createElement("div");
    row.className = "message-row user-row";
    row.innerHTML = `<div class="message user-message">${text}</div><img src="${USER_IMG}" alt="User" class="profile-pic">`;
    chatBox.appendChild(row);
    chatBox.scrollTop = chatBox.scrollHeight;
}

let currentStep = 0;
const surveyData = {};
let tempFeedback = "";

function submitToGoogleForm(userType, feedback) {
    const formURL = "https://docs.google.com/forms/d/e/1FAIpQLSdRmZApkq3iVhuQE65mla9LAelSzQtEMcD7QtTTf3nXvpSOKQ/formResponse";
    const params = new URLSearchParams();
    params.append("entry.1079308243", userType); 
    params.append("entry.1712032602", feedback); 
    fetch(formURL, {
        method: "POST",
        mode: "no-cors",
        body: params
    }).catch(err => console.error(err));
}

window.onload = async () => {
    const lastSubmitTime = localStorage.getItem("regAiLastSubmit");
    if (lastSubmitTime) {
        const timePassed = Date.now() - parseInt(lastSubmitTime);
        const cooldown = 2 * 60 * 1000; 
        if (timePassed < cooldown) {
            const minutesLeft = Math.ceil((cooldown - timePassed) / 60000);
            document.getElementById("user-input").disabled = true;
            document.getElementById("user-input").placeholder = "พักแป๊บนึงน้า...";
            await sendBotMessages([
                "ขอบคุณสำหรับความคิดเห็นมากๆ เลยจ้า!",
                `แต่ระบบตรวจพบว่าคุณเพิ่งตอบไป รบกวนรออีกประมาณ ${minutesLeft} นาที แล้วค่อยกลับมาใหม่น้า`
            ]);
            return; 
        }
    }

    await sendBotMessages([
        "สวัสดีจ้า ฉันคือน้องบอท ทำหน้าที่มาเก็บความคิดเห็น",
        "ตอนนี้สำนักทะเบียนกำลังจะทำ AI เลยอยากฟังความคิดเห็นของคุณว่า อยากให้ AI เป็นแบบไหน หรือช่วยทำอะไรได้บ้าง",
        "ก่อนอื่น คุณเป็นคนกลุ่มไหน พิมพ์เลขบอกหน่อยนะ",
        "พิมพ์ 1 นักศึกษาใหม่ <br> พิมพ์ 2 นักศึกษาปัจจุบัน <br> พิมพ์ 3 ศิษย์เก่า"
    ]);
};

async function botBrainLogic(userInput) {
    if (currentStep === 0) {
        if (userInput === "1" || userInput === "2" || userInput === "3") {
            let greeting1 = "";
            let greeting2 = "";
            if (userInput === "1") {
                surveyData.userType = "นักศึกษาใหม่";
                greeting1 = "น้องใหม่นี่เอง";
                greeting2 = "ยินดีต้อนรับสู่รั้วธรรมศาสตร์นะ";
            } else if (userInput === "2") {
                surveyData.userType = "นักศึกษาปัจจุบัน";
                greeting1 = "นศ. ปัจจุบันนี่เอง";
                greeting2 = "สู้ๆ กับการเรียนนะ";
            } else if (userInput === "3") {
                surveyData.userType = "ศิษย์เก่า";
                greeting1 = "สวัสดีจ้า";
                greeting2 = "คุณพี่ศิษย์เก่า";
            }
            currentStep = 1;
            await sendBotMessages([
                greeting1,
                greeting2,
                "ถ้าสำนักทะเบียนมี AI อยากให้ AI เป็นแบบไหน ตอบคำถามอะไร หรือช่วยเหลืออะไรได้บ้าง พิมพ์ความคิดเห็นมาได้เลยนะ"
            ]);
        } else {
            await sendBotMessages([
                "ขอเป็นตัวเลข 1, 2 หรือ 3 เท่านั้นจ้า ลองพิมพ์ใหม่นะ"
            ]);
        }
    } 
    else if (currentStep === 1) {
        if (userInput.length <= 8) {
            await sendBotMessages([
                "ความคิดเห็นสั้นไปนิดนึงน้า ช่วยอธิบายเพิ่มเติมอีกหน่อยได้ไหมจ๊ะ"
            ]);
        } else {
            tempFeedback = userInput;
            currentStep = 1.5; 
            await sendBotMessages([
                `ขอทวนนะ ความคิดเห็นของคุณคือ "${tempFeedback}" ถูกไหมเอ่ย`,
                `พิมพ์แค่ "ใช่" เพื่อยืนยัน หรือพิมพ์ข้อเสนอมาใหม่ได้เลยจ้า`
            ]);
        }
    } 
    else if (currentStep === 1.5) {
        const confirmText = userInput.trim(); 
        if (confirmText === "ใช่") {
            surveyData.feedback = tempFeedback;
            currentStep = 2; 
            submitToGoogleForm(surveyData.userType, surveyData.feedback);
            localStorage.setItem("regAiLastSubmit", Date.now().toString());
            await sendBotMessages([
                "จดความคิดเห็นเรียบร้อย!",
                "ต้องขอบคุณมาก ๆ นะ",
                "ข้อมูลนี้จะเป็นประโยชน์ในการสร้าง AI ของเราจ้า"
            ]);
            document.getElementById("user-input").disabled = true;
            document.getElementById("user-input").placeholder = "จบการสนทนาแล้วจ้า";
        } else {
            if (userInput.length <= 8) {
                await sendBotMessages([
                    "ความคิดเห็นสั้นไปนิดนึงน้า ลองพิมพ์อธิบายเพิ่มอีกหน่อยจ้า"
                ]);
            } else {
                tempFeedback = userInput;
                await sendBotMessages([
                    `อัปเดตข้อมูลแล้วจ้า ขอทวนนะ ความคิดเห็นของคุณคือ "${tempFeedback}" ถูกไหมเอ่ย`,
                    `พิมพ์แค่ "ใช่" เพื่อยืนยัน หรือพิมพ์แก้มาใหม่ได้เลยจ้า`
                ]);
            }
        }
    }
}
</script>
</body>
</html>
