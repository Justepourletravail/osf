<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REG Bot Questionnaire Chat</title>
    <style>
        html, body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #f0f2f5; }
        #chat-container { 
            width: 100%; 
            max-width: 420px;
            height: 100%; 
            margin: 0 auto;
            background: #ffffff; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        
        #chat-header { background: #1a365d; color: white; padding: 16px; text-align: center; font-size: 1.1em; font-weight: bold; }
        
        #chat-box { flex: 1; padding: 20px 16px; overflow-y: auto; display: flex; flex-direction: column; background-color: #ffffff; }
        
        .message-row { display: flex; align-items: flex-start; margin-bottom: 2px; }
        .bot-row { justify-content: flex-start; }
        .user-row { justify-content: flex-end; margin-top: 16px; margin-bottom: 16px; }
        .profile-pic { width: 32px; height: 32px; border-radius: 50%; margin: 0 8px; background-color: #edf2f7; object-fit: cover; display: inline-block; flex-shrink: 0; border: 1px solid #cbd5e0; }
        .hide-pic { visibility: hidden; }
        .message { max-width: 65.5%; padding: 10px 16px; font-size: 14.5px; line-height: 1.4; word-wrap: break-word; word-break: break-word; display: inline-block; }
        .user-message { background: #1a365d; color: #ffffff; border-radius: 18px; }
        .bot-message { background: #edf2f7; color: #2d3748; }
        
        .bot-msg-single { border-radius: 18px; }
        .bot-msg-first { border-radius: 18px 18px 18px 4px; }
        .bot-msg-mid { border-radius: 4px 18px 18px 4px; }
        .bot-msg-last { border-radius: 4px 18px 18px 18px; }

        .typing-indicator { padding: 14px 16px; display: flex; align-items: center; gap: 4px; }
        .typing-indicator span { display: inline-block; width: 6px; height: 6px; background-color: #718096; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        .options-container { display: flex; flex-wrap: wrap; gap: 8px; max-width: 75%; margin-top: 4px; }
        .chat-option-btn { background: #ffffff; color: #1a365d; border: 1.5px solid #1a365d; padding: 8px 14px; border-radius: 18px; cursor: pointer; font-size: 13.5px; font-weight: 600; transition: all 0.2s; outline: none; }
        .chat-option-btn:hover { background: #1a365d; color: #ffffff; }

        #input-area { display: flex; padding: 12px; background: #f8fafc; border-top: 1px solid #e2e8f0; }
        #user-input { flex: 1; padding: 12px 16px; border: 1px solid #cbd5e0; background-color: #ffffff; border-radius: 20px; outline: none; font-size: 14px; transition: border-color 0.2s; }
        #user-input:focus { border-color: #1a365d; }
        #send-btn { background: #1a365d; color: white; border: none; padding: 10px 18px; margin-left: 8px; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 14px; transition: background 0.2s; }
        #send-btn:hover { background: #2a4365; }
    </style>
</head>
<body>

    <div id="chat-container">
        <div id="chat-header">REG Bot Questionnaire Chat</div>
        <div id="chat-box"></div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="พิมพ์ข้อความ..." onkeypress="handleKeyPress(event)">
            <button id="send-btn" onclick="handleUserSubmit()">ส่ง</button>
        </div>
    </div>

const BOT_IMG = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(botSvg);
const USER_IMG = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(userSvg);

const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

async function handleUserSubmit() {
    const inputField = document.getElementById("user-input");
    const messageText = inputField.value.trim();
    if (messageText === "") return;

    const activeOptions = document.getElementById("active-options");
    if (activeOptions) activeOptions.remove();

    appendUserMessage(messageText);
    inputField.value = ""; 
    inputField.disabled = true;

    await botBrainLogic(messageText); 
    
    inputField.disabled = false;
    inputField.focus();
}

function handleKeyPress(event) {
    if (event.key === "Enter") handleUserSubmit();
}

function showOptions(options) {
    const chatBox = document.getElementById("chat-box");
    
    const row = document.createElement("div");
    row.id = "active-options";
    row.className = "message-row bot-row";
    
    const picPlaceholder = document.createElement("div");
    picPlaceholder.className = "profile-pic hide-pic";
    row.appendChild(picPlaceholder);

    const btnContainer = document.createElement("div");
    btnContainer.className = "options-container";
    
    options.forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "chat-option-btn";
        btn.innerText = opt.label;
        btn.onclick = () => {
            document.getElementById("active-options").remove();
            const inputField = document.getElementById("user-input");
            inputField.value = opt.value;
            handleUserSubmit();
        };
        btnContainer.appendChild(btn);
    });
    
    row.appendChild(btnContainer);
    chatBox.appendChild(row);
    chatBox.scrollTop = chatBox.scrollHeight;
}

async function sendBotMessages(messagesArray) {
    const isGroup = messagesArray.length > 1;
    for (let i = 0; i < messagesArray.length; i++) {
        const showProfilePic = (i === 0); 
        const typingId = "typing-" + Date.now();
        let position = "single";
        if (isGroup) {
            if (i === 0) position = "first";
            else if (i === messagesArray.length - 1) position = "last";
            else position = "mid";
        }

        appendTypingIndicator(typingId, showProfilePic, position);
        const delay = Math.max(600, messagesArray[i].length * 15); 
        await sleep(delay); 
        removeElement(typingId);
        appendBotMessage(messagesArray[i], showProfilePic, position);
    }
}

function appendTypingIndicator(id, showPic, position) {
    const chatBox = document.getElementById("chat-box");
    const row = document.createElement("div");
    row.id = id;
    row.className = "message-row bot-row";
    const picClass = showPic ? "profile-pic" : "profile-pic hide-pic";
    let radiusClass = position === "first" ? "bot-msg-first" : position === "mid" ? "bot-msg-mid" : position === "last" ? "bot-msg-last" : "bot-msg-single";
    row.innerHTML = `<img src="${BOT_IMG}" alt="Bot" class="${picClass}"><div class="message bot-message ${radiusClass} typing-indicator"><span></span><span></span><span></span></div>`;
    chatBox.appendChild(row);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function removeElement(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
}

function appendBotMessage(text, showPic, position) {
    const chatBox = document.getElementById("chat-box");
    const row = document.createElement("div");
    row.className = "message-row bot-row";
    const picClass = showPic ? "profile-pic" : "profile-pic hide-pic";
    let radiusClass = position === "first" ? "bot-msg-first" : position === "mid" ? "bot-msg-mid" : position === "last" ? "bot-msg-last" : "bot-msg-single";
    row.innerHTML = `<img src="${BOT_IMG}" alt="Bot" class="${picClass}"><div class="message bot-message ${radiusClass}">${text}</div>`;
    chatBox.appendChild(row);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function appendUserMessage(text) {
    const chatBox = document.getElementById("chat-box");
    const row = document.createElement("div");
    row.className = "message-row user-row";
    row.innerHTML = `<div class="message user-message">${text}</div><img src="${USER_IMG}" alt="User" class="profile-pic">`;
    chatBox.appendChild(row);
    chatBox.scrollTop = chatBox.scrollHeight;
}

let currentStep = -1;
let currentLang = "";
const surveyData = {};
let tempFeedback = "";
let profanityCount = 0;

function submitToGoogleForm(userType, feedback) {
    const formURL = "https://docs.google.com/forms/d/e/1FAIpQLSdRmZApkq3iVhuQE65mla9LAelSzQtEMcD7QtTTf3nXvpSOKQ/formResponse";
    const params = new URLSearchParams();
    params.append("entry.1079308243", userType); 
    params.append("entry.1712032602", feedback); 
    fetch(formURL, {
        method: "POST",
        mode: "no-cors",
        body: params
    }).catch(err => console.error(err));
}

window.onload = async () => {
    const lastSubmitTime = localStorage.getItem("regAiLastSubmit");
    if (lastSubmitTime) {
        const timePassed = Date.now() - parseInt(lastSubmitTime);
        const cooldown = 2 * 60 * 1000; 
        if (timePassed < cooldown) {
            const minutesLeft = Math.ceil((cooldown - timePassed) / 60000);
            document.getElementById("user-input").disabled = true;
            document.getElementById("user-input").placeholder = "พักแป๊บนึงน้า... / Please wait...";
            await sendBotMessages([
                "ขอบคุณสำหรับความคิดเห็นมากๆ เลยจ้า! / Thank you so much for your feedback!",
                `แต่ระบบตรวจพบว่าคุณเพิ่งตอบไป รบกวนรออีกประมาณ ${minutesLeft} นาที แล้วค่อยกลับมาใหม่น้า / Please wait about ${minutesLeft} minutes before submitting again!`
            ]);
            return; 
        }
    }

    await sendBotMessages([
        "สวัสดีจ้า! Please select your language / กรุณาเลือกภาษา",
        "พิมพ์ TH สำหรับภาษาไทย <br> Type EN for English"
    ]);
    showOptions([
        {label: "ภาษาไทย", value: "TH"},
        {label: "English", value: "EN"}
    ]);
};

async function botBrainLogic(userInput) {
    const badWords = [
        "เหี้ย", "สัส", "เย็ด", "ควย", "แตด", "ดอกทอง",
        "ตอแหล", "แรด", "กะหรี่", "สวะ", "ระยำ", "จัญไร", "ควาย", "อีดอก",
        "ส้นตีน", "หน้าโง่", "ไอ้โง่", "อีโง่", "เสือก", "อีควาย", "ไอ้ควาย", "อีห่า",
        "พ่อตาย", "แม่ตาย", "พ่อง", "ชิบหาย", "ค.ว.ย", "ค.ว.ย.", "Bitch", "Fuck","bitch", "fuck"
    ];

    const isRude = badWords.some(word => userInput.includes(word));

    if (isRude) {
        profanityCount++;
        
        let warn1 = currentLang === "EN" ? "No bad words allowed!" : "ห้ามพูดคำหยาบ!";
        let warn2 = currentLang === "EN" ? "Stop! Please don't use bad words." : "หยุดนะ! อย่าพูดคำหยาบ";
        let warn3 = "😡😡😡";

        if (profanityCount === 1) {
            await sendBotMessages([warn1]);
        } else if (profanityCount === 2) {
            await sendBotMessages([warn2]);
        } else {
            await sendBotMessages([warn3]);
        }
        
        if (currentStep === -1) {
            await sendBotMessages(["พิมพ์ TH สำหรับภาษาไทย <br> Type EN for English"]);
            showOptions([
                {label: "ภาษาไทย", value: "TH"},
                {label: "English", value: "EN"}
            ]);
        } else if (currentStep === 0) {
            let msg = currentLang === "EN" ? "Which group do you belong to? Type 1, 2, or 3." : "สรุปว่าคุณเป็นคนกลุ่มไหน พิมพ์เลข 1, 2 หรือ 3 มาใหม่นะ";
            await sendBotMessages([msg]);
            showOptions([
                {label: currentLang === "EN" ? "1. New Student" : "1. นักศึกษาใหม่", value: "1"},
                {label: currentLang === "EN" ? "2. Current Student" : "2. นักศึกษาปัจจุบัน", value: "2"},
                {label: currentLang === "EN" ? "3. Alumni" : "3. ศิษย์เก่า", value: "3"}
            ]);
        } else if (currentStep === 1) {
            let msg = currentLang === "EN" ? "Please type nicely." : "พิมพ์ดี ๆ";
            await sendBotMessages([msg]);
        } else if (currentStep === 1.5) {
            let msg = currentLang === "EN" ? `Just type "Yes" to confirm, or type your new feedback.` : `พิมพ์แค่ "ใช่" เพื่อยืนยัน หรือพิมพ์แก้ความเห็นมาใหม่`;
            await sendBotMessages([msg]);
            showOptions([
                {label: currentLang === "EN" ? "YES" : "ใช่", value: currentLang === "EN" ? "YES" : "ใช่"}
            ]);
        }
        
        return;
    }
    
    profanityCount = 0;

    if (currentStep === -1) {
        const langInput = userInput.trim().toUpperCase();
        if (langInput === "TH" || langInput === "EN") {
            currentLang = langInput;
            currentStep = 0;
            
            if (currentLang === "TH") {
                await sendBotMessages([
                    "สวัสดีจ้า ฉันคือน้อง Bot มาทำหน้าที่เก็บความคิดเห็น",
                    "ตอนนี้สำนักทะเบียนกำลังจะทำ Bot เลยอยากฟังความคิดเห็นของคุณว่า อยากให้ Bot เป็นแบบไหน หรือช่วยทำอะไรได้บ้าง",
                    "ก่อนอื่น คุณเป็นคนกลุ่มไหน พิมพ์เลขบอกหน่อยนะ",
                    "พิมพ์ 1 นักศึกษาใหม่ (รหัส 69) <br> พิมพ์ 2 นักศึกษาปัจจุบัน <br> พิมพ์ 3 ศิษย์เก่า"
                ]);
                showOptions([
                    {label: "1. นักศึกษาใหม่ (รหัส 69)", value: "1"},
                    {label: "2. นักศึกษาปัจจุบัน", value: "2"},
                    {label: "3. ศิษย์เก่า", value: "3"}
                ]);
            } else {
                await sendBotMessages([
                    "Hi there! I'm the REG Bot, here to collect your feedback.",
                    "The Registrar's Office is planning to build a new Bot, and we'd love to hear your thoughts on what it should be like or how it can help you.",
                    "First off, which group do you belong to? Just type the number.",
                    "Type 1 for New Student (ID 69) <br> Type 2 for Current Student <br> Type 3 for Alumni"
                ]);
                showOptions([
                    {label: "1. New Student (ID 69)", value: "1"},
                    {label: "2. Current Student", value: "2"},
                    {label: "3. Alumni", value: "3"}
                ]);
            }
        } else {
            await sendBotMessages([
                "กรุณาพิมพ์ TH หรือ EN เท่านั้นจ้า / Please type TH or EN only."
            ]);
            showOptions([
                {label: "ภาษาไทย", value: "TH"},
                {label: "English", value: "EN"}
            ]);
        }
    }
    else if (currentStep === 0) {
        if (userInput === "1" || userInput === "2" || userInput === "3") {
            let greeting1 = "";
            let greeting2 = "";
            
            if (userInput === "1") {
                surveyData.userType = "นักศึกษาใหม่ (รหัส 69)";
                greeting1 = "Hi Hi!";
                greeting2 = currentLang === "EN" ? "Welcome to Thammasat!" : "ยินดีต้อนรับสู่รั้วธรรมศาสตร์นะ";
            } else if (userInput === "2") {
                surveyData.userType = "นักศึกษาปัจจุบัน";
                greeting1 = "Hey bro!";
                greeting2 = currentLang === "EN" ? "Keep fighting with your studies!" : "สู้ๆ กับการเรียนนะ";
            } else if (userInput === "3") {
                surveyData.userType = "ศิษย์เก่า";
                greeting1 = currentLang === "EN" ? "Oh, I see!" : "อ๋อจ้า";
                greeting2 = currentLang === "EN" ? "Senior!" : "คุณพี่";
            }
            currentStep = 1;

            let questionMsg = currentLang === "EN" ? 
                "Let's get straight to the point! If the Registrar's Office creates a REG Bot, what would you like it to help you with? Leave your ideas or questions right here!" : 
                "เข้าเรื่องเลยนะ หากสำนักงานทะเบียนนักศึกษาจะทำ REG Bot คุณอยากให้ REG Bot ของเราช่วยอะไร ฝากความเห็น/คำถามไว้ได้เลยนะ";

            await sendBotMessages([
                greeting1,
                greeting2,
                questionMsg
            ]);
        } else {
            let errorMsg = currentLang === "EN" ? "Please type only the number 1, 2, or 3. Let's try again!" : "ขอเป็นตัวเลข 1, 2 หรือ 3 เท่านั้นจ้า ลองพิมพ์ใหม่นะ";
            await sendBotMessages([errorMsg]);
            showOptions([
                {label: currentLang === "EN" ? "1. New Student" : "1. นักศึกษาใหม่", value: "1"},
                {label: currentLang === "EN" ? "2. Current Student" : "2. นักศึกษาปัจจุบัน", value: "2"},
                {label: currentLang === "EN" ? "3. Alumni" : "3. ศิษย์เก่า", value: "3"}
            ]);
        }
    } 
    else if (currentStep === 1) {
        if (userInput.length <= 8) {
            let shortMsg = currentLang === "EN" ? "Your feedback is a bit too short! Could you explain a little more for me?" : "ความคิดเห็นสั้นไปนิดนึงน้า ช่วยอธิบายเพิ่มเติมอีกหน่อยได้ไหมจ๊ะ";
            await sendBotMessages([shortMsg]);
        } else {
            tempFeedback = userInput;
            currentStep = 1.5; 
            
            let confirm1 = currentLang === "EN" ? `Let me double-check. Your feedback is: "${tempFeedback}", right?` : `ขอทวนนะ ความคิดเห็นของคุณคือ "${tempFeedback}" ถูกไหมเอ่ย`;
            let confirm2 = currentLang === "EN" ? `Just type "Yes" to confirm, or type your new ideas here!` : `พิมพ์แค่ "ใช่" เพื่อยืนยัน หรือพิมพ์ข้อเสนอมาใหม่ได้เลยจ้า`;

            await sendBotMessages([confirm1, confirm2]);
            showOptions([
                {label: currentLang === "EN" ? "YES" : "ใช่", value: currentLang === "EN" ? "YES" : "ใช่"}
            ]);
        }
    } 
    else if (currentStep === 1.5) {
        const confirmText = userInput.trim().toUpperCase(); 
        
        const isConfirm = (currentLang === "TH" && confirmText === "ใช่") || (currentLang === "EN" && confirmText === "YES");

        if (isConfirm) {
            surveyData.feedback = tempFeedback;
            currentStep = 2; 
            submitToGoogleForm(surveyData.userType, surveyData.feedback);
            localStorage.setItem("regAiLastSubmit", Date.now().toString());

            let final1 = currentLang === "EN" ? "Feedback noted!" : "จดความคิดเห็นเรียบร้อย!";
            let final2 = currentLang === "EN" ? `Your feedback is: "${tempFeedback}"` : `ความคิดเห็นของคุณคือ "${tempFeedback}"`;
            let final3 = currentLang === "EN" ? "Thank you so much!" : "ต้องขอบคุณมาก ๆ นะ";
            let final4 = currentLang === "EN" ? "This info will be super helpful in developing our Bot." : "ข้อมูลนี้จะเป็นประโยชน์ในการพัฒนา Bot ของเราจ้า";
            let final5 = currentLang === "EN" ? "If you want to leave more comments, just wait 2 minutes and refresh the chat!" : "หากคุณอยากแสดงความเห็นเพิ่มเติม รอ 2 นาที แล้ว Refresh Chat ใหม่น้า";

            await sendBotMessages([final1, final2, final3, final4, final5]);

            document.getElementById("user-input").disabled = true;
            document.getElementById("user-input").placeholder = currentLang === "EN" ? "Chat ended!" : "จบการสนทนาแล้วจ้า";
        } else {
            if (userInput.length <= 8) {
                let fail1 = currentLang === "EN" ? `If you want to confirm your previous feedback, just type the word "Yes".` : `ถ้าต้องการยืนยันความเห็นเดิม พิมพ์แค่คำว่า "ใช่" คำเดียวนะจ๊ะ`;
                let fail2 = currentLang === "EN" ? "But if you meant to change your feedback, your previous message was a bit too short. Please type a little more to explain!" : "แต่ถ้าตั้งใจจะแก้ความเห็นใหม่ ข้อความเมื่อกี้ยังสั้นไปนิดนึง รบกวนพิมพ์อธิบายเพิ่มให้อีกหน่อยจ้า";
                await sendBotMessages([fail1, fail2]);
                showOptions([
                    {label: currentLang === "EN" ? "YES" : "ใช่", value: currentLang === "EN" ? "YES" : "ใช่"}
                ]);
            } else {
                tempFeedback = userInput;
                
                let update1 = currentLang === "EN" ? `Data updated! Let me double-check. Your new feedback is: "${tempFeedback}", right?` : `อัปเดตข้อมูลแล้วจ้า ขอทวนนะ ความคิดเห็นของคุณคือ "${tempFeedback}" ถูกไหมเอ่ย`;
                let update2 = currentLang === "EN" ? `Just type "Yes" to confirm, or type your new ideas here!` : `พิมพ์แค่ "ใช่" คำเดียวเพื่อยืนยัน หรือพิมพ์แก้มาใหม่ได้เลยจ้า`;
                
                await sendBotMessages([update1, update2]);
                showOptions([
                    {label: currentLang === "EN" ? "YES" : "ใช่", value: currentLang === "EN" ? "YES" : "ใช่"}
                ]);
            }
        }
    }
}
</script>

</html>
